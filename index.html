<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .card {
      margin-top: 40px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      display: inline-block;
      max-width: 500px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 10px 0;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1e4d;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>👋 Hello!</h1>
    <p>Welcome to my personal website 🚀</p>

    <div class="card">
      <h2>🌍 About Me</h2>
      <p>I live in Germany 🇩🇪 and I'm learning coding.</p>

      <h2>🚀 My Goals</h2>
      <ul>
        <li>Learn programming</li>
        <li>Build projects</li>
        <li>Improve every day</li>
      </ul>

      <button class="btn">Follow my journey ✨</button>
    </div>
  </div>

</body>
</html>
